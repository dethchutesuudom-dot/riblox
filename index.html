<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Guide Market</title>
    <link rel="stylesheet" href="index.css">
    <script src="index.js" defer></script>
</head>
<body>

    <header>
        <div class="container">
 <a href="#" class="logo">GUIDE.IO</a>
 <nav>
 <a href="#">Games</a>
 <a href="#">Guides</a>
 <a href="#">Community</a>
 </nav>
 <div class="header-actions">
 <button class="login-btn">Log In</button>
 </div>
        </div>
    </header>

    <main>
        <section class="hero">
 <div class="container">
 <h1>Find Your Next Victory</h1>
 <p>Expert guides for the world's most popular games.</p>
 <div class="search-bar">
 <input type="text" id="searchInput" placeholder="Search for a game (e.g., Elden Ring)">
 </div>
 </div>
        </section>

        <section class="market-section">
 <div class="container">
 <h2>Featured Guides</h2>
 <div class="guide-grid" id="guideGrid">
 <!-- Guide cards will be dynamically inserted here by JavaScript -->
 </div>
 </div>
        </section>
    </main>

    <footer>
        <div class="container">
 <p>&copy; 2024 GUIDE.IO. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
